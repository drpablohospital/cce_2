<!DOCTYPE html>
<html>
<head>
    <title>Suscriptores Newsletter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Panel de Control</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_dashboard') }}">Registros</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_messages') }}">Mensajes</a></li>
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('admin_subscribers') }}">Suscriptores</a></li>
                </ul>
                <a href="{{ url_for('admin_logout') }}" class="btn btn-outline-light">Cerrar sesión</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>Suscriptores del Newsletter</h2>
        <div class="table-responsive">
            <table class="table table-striped">
                <thead>
                     <tr>
                        <th>Email</th>
                        <th>Fecha de suscripción</th>
                     </tr>
                </thead>
                <tbody>
                    {% for sub in subscribers %}
                     <tr>
                         <td>{{ sub.email }}</td>
                         <td>{{ sub.created_at.strftime('%Y-%m-%d %H:%M') }}</td>
                     </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
